rules:
  - rule_id: DARPA_WEB_SHELL_DROP
    name: "DARPA E3 web shell or suspicious file drop"
    apt_stage: "Initial Compromise"
    stage: 1
    severity: 7
    cvss: 7.5
    prerequisites: []
    match_logic:
      engine: sigma
      condition:
        compiled:
          type: logical
          operator: AND
          operands:
            - type: selector_ref
              selector: rel_write
            - type: selector_group
              quantifier: COUNT
              count: 1
              selectors:
                - sel_var_www
                - sel_tmp_drop
      selectors:
        rel_write:
          type: object
          items:
            - type: field_match
              field: cdr.semantic_relations
              modifiers: ["contains"]
              value:
                type: literal
                value: "write"
        sel_var_www:
          type: object
          items:
            - type: field_match
              field: object
              modifiers: ["contains"]
              value:
                type: literal
                value: "file:/var/www/"
        sel_tmp_drop:
          type: object
          items:
            - type: field_match
              field: object
              modifiers: ["contains"]
              value:
                type: literal
                value: "file:/tmp/"

  - rule_id: DARPA_NGINX_FIREFOX_EXEC
    name: "DARPA E3 nginx or firefox execution"
    apt_stage: "Initial Compromise"
    stage: 1
    severity: 8
    cvss: 8.5
    prerequisites: []
    match_logic:
      engine: sigma
      condition:
        compiled:
          type: logical
          operator: AND
          operands:
            - type: selector_ref
              selector: rel_execute
            - type: selector_group
              quantifier: COUNT
              count: 1
              selectors:
                - sel_nginx
                - sel_firefox
      selectors:
        rel_execute:
          type: object
          items:
            - type: field_match
              field: cdr.semantic_relations
              modifiers: ["contains"]
              value:
                type: literal
                value: "execute"
        sel_nginx:
          type: object

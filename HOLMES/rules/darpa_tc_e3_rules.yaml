    match_logic:
      engine: sigma
      condition:
        compiled:
          type: logical
          operator: AND
          operands:
            - type: selector_ref
              selector: rel_mem_exec
            - type: selector_ref
              selector: sel_mem
      selectors:
        rel_mem_exec:
          type: object
          items:
            - type: field_match
              field: cdr.semantic_relations
              modifiers: ["contains"]
              value:
                type: literal
                value: "make_mem_exec"
        sel_mem:
          type: object
          items:
            - type: field_match
              field: object
              modifiers: ["contains"]
              value:
                type: literal
                value: "mem:"


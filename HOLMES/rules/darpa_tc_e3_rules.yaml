  - rule_id: DARPA_SUSPICIOUS_SHELL_EXEC
    name: "DARPA E3 suspicious shell execution"
    apt_stage: "Establish Foothold"
    stage: 2
    severity: 7
    cvss: 7.0
    prerequisites:
      - shared_entity
      - graph_path
      - type: path_factor
        max_path_factor: 3
    match_logic:
      engine: sigma
      condition:
        compiled:
          type: logical
          operator: AND
          operands:
            - type: selector_ref
              selector: rel_execute
            - type: selector_group
              quantifier: COUNT
              count: 1
              selectors:
                - sel_bash
                - sel_sh
      selectors:
        rel_execute:
          type: object
          items:
            - type: field_match
              field: cdr.semantic_relations
              modifiers: ["contains"]
              value:
                type: literal
                value: "execute"
        sel_bash:
          type: object
          items:
            - type: field_match
              field: Image
              modifiers: ["contains"]
              value:
                type: literal
                value: "/bin/bash"
        sel_sh:
          type: object
          items:
            - type: field_match
              field: Image
              modifiers: ["contains"]
              value:
                type: literal
                value: "/bin/sh"

  - rule_id: DARPA_PRIV_ESC_SU_SUDO
    name: "DARPA E3 sudo or su privilege escalation"
    apt_stage: "Privilege Escalation"
    stage: 4
    severity: 9
    cvss: 9.0
    bypass_benign_filter: true
    prerequisites:
      - shared_entity
      - graph_path
      - type: path_factor
        max_path_factor: 3
    match_logic:
      engine: sigma
      condition:
        compiled:
          type: logical
          operator: AND
          operands:
            - type: selector_ref
              selector: rel_execute
            - type: selector_group
              quantifier: COUNT
              count: 1
              selectors:
                - sel_sudo
                - sel_su
      selectors:
        rel_execute:
          type: object
          items:
            - type: field_match
              field: cdr.semantic_relations
              modifiers: ["contains"]
              value:
                type: literal
                value: "execute"
        sel_sudo:
          type: object
          items:
            - type: field_match
              field: CommandLine
              modifiers: ["contains"]
              value:
                type: literal
                value: "sudo"
        sel_su:
          type: object
          items:
            - type: field_match
              field: CommandLine
              modifiers: ["contains"]
              value:
                type: literal
                value: " su "

  - rule_id: DARPA_PRIV_ESC_MEM_EXEC
    name: "DARPA E3 executable memory permission change"
    apt_stage: "Privilege Escalation"
    stage: 4
    severity: 9
    cvss: 9.5
    bypass_benign_filter: true
    prerequisites:
      - shared_entity
      - graph_path
      - type: path_factor
